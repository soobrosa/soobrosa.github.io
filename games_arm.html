<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Apple Silicon Game Explorer</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #171a21;
    --panel-2: #1e222b;
    --border: #2a2f3a;
    --text: #e6e8ee;
    --muted: #9aa3b2;
    --accent: #4f8cff;
    --green: #46c46b;
    --lime: #9ad84f;
    --yellow: #e8c84a;
    --orange: #f0934a;
    --red: #ef5b6b;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  .wrap { max-width: 1180px; margin: 0 auto; padding: 28px 20px 60px; }
  header h1 { font-size: 22px; margin: 0 0 4px; letter-spacing: .2px; }
  header p { margin: 0; color: var(--muted); }
  .stats { display: flex; flex-wrap: wrap; gap: 10px; margin: 18px 0 22px; }
  .stat {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 14px; min-width: 110px;
  }
  .stat .num { font-size: 20px; font-weight: 600; }
  .stat .lbl { color: var(--muted); font-size: 12px; }
  .controls {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px; margin-bottom: 18px;
    display: flex; flex-wrap: wrap; gap: 16px; align-items: flex-end;
  }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .field label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
  input[type=search], select {
    background: var(--panel-2); color: var(--text);
    border: 1px solid var(--border); border-radius: 8px;
    padding: 9px 11px; font-size: 14px; outline: none;
  }
  input[type=search] { min-width: 260px; }
  input[type=search]:focus, select:focus { border-color: var(--accent); }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip {
    background: var(--panel-2); border: 1px solid var(--border);
    color: var(--muted); border-radius: 999px; padding: 6px 12px;
    cursor: pointer; font-size: 13px; user-select: none; transition: .12s;
  }
  .chip:hover { border-color: var(--accent); color: var(--text); }
  .chip.on { background: var(--accent); border-color: var(--accent); color: #fff; }
  .grow { flex: 1; }
  .countline { color: var(--muted); margin: 0 2px 10px; font-size: 13px; }
  table { width: 100%; border-collapse: collapse; }
  thead th {
    position: sticky; top: 0; background: var(--panel);
    text-align: left; padding: 10px 12px; font-size: 12px;
    color: var(--muted); text-transform: uppercase; letter-spacing: .5px;
    border-bottom: 1px solid var(--border); cursor: pointer; white-space: nowrap;
  }
  thead th.num, tbody td.num { text-align: right; }
  thead th .arrow { color: var(--accent); }
  tbody td { padding: 10px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tbody tr:hover { background: var(--panel); }
  .title { font-weight: 500; }
  a.title-link { color: var(--text); text-decoration: none; }
  a.title-link:hover { color: var(--accent); text-decoration: underline; }
  a.mc-link { text-decoration: none; }
  a.mc-link:hover .mc { text-decoration: underline; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 6px; font-size: 12px; font-weight: 600; }
  .cat-arm { background: rgba(70,196,107,.16); color: var(--green); }
  .cat-rosetta { background: rgba(79,140,255,.16); color: var(--accent); }
  .cat-steam { background: rgba(232,200,74,.16); color: var(--yellow); }
  .cat-crossover { background: rgba(240,147,74,.16); color: var(--orange); }
  .store { display: inline-block; padding: 1px 7px; border-radius: 5px; font-size: 11px;
           margin-right: 4px; background: var(--panel-2); border: 1px solid var(--border); color: var(--muted); }
  a.store { text-decoration: none; }
  a.store:hover { border-color: var(--accent); color: var(--text); }
  .mc { font-weight: 700; }
  .mc-90 { color: var(--green); } .mc-80 { color: var(--lime); }
  .mc-70 { color: var(--yellow); } .mc-60 { color: var(--orange); }
  .mc-low { color: var(--red); } .mc-na { color: var(--muted); }
  .pctbar { display: flex; align-items: center; gap: 10px; }
  .pctbar .track { flex: 0 0 90px; height: 6px; border-radius: 3px; background: var(--panel-2); overflow: hidden; }
  .pctbar .fill { height: 100%; border-radius: 3px; }
  .pctbar .pct { font-weight: 600; font-variant-numeric: tabular-nums; min-width: 38px; }
  .pctbar .desc { color: var(--muted); white-space: nowrap; }
  .muted { color: var(--muted); }
  .empty { text-align: center; padding: 40px; color: var(--muted); }
  @media (max-width: 760px) {
    .hide-sm { display: none; }
    input[type=search] { min-width: 180px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Apple Silicon Game Explorer</h1>
    <p id="subtitle"></p>
  </header>

  <div class="stats" id="stats"></div>

  <div class="controls">
    <div class="field grow">
      <label for="q">Search title</label>
      <input id="q" type="search" placeholder="Type to filter by name…" autocomplete="off">
    </div>
    <div class="field">
      <label for="cat">Compatibility</label>
      <select id="cat"><option value="">All</option></select>
    </div>
    <div class="field">
      <label for="store">Store</label>
      <select id="store"><option value="">All</option></select>
    </div>
    <div class="field">
      <label for="steam">Steam reviews</label>
      <select id="steam"><option value="">All</option></select>
    </div>
    <div class="field">
      <label for="minmc">Min Metacritic</label>
      <select id="minmc">
        <option value="0">Any</option>
        <option value="90">90+</option>
        <option value="80">80+</option>
        <option value="70">70+</option>
        <option value="60">60+</option>
      </select>
    </div>
  </div>

  <p class="countline" id="count"></p>

  <table>
    <thead>
      <tr>
        <th data-key="title">Title</th>
        <th data-key="category" class="hide-sm">Compatibility</th>
        <th data-key="stores" class="hide-sm">Stores</th>
        <th data-key="mc" class="num">MC</th>
        <th data-key="steam_pct">Steam %</th>
        <th data-key="steam_n" class="num hide-sm">Reviews</th>
      </tr>
    </thead>
    <tbody id="rows"></tbody>
  </table>
  <div class="empty" id="empty" style="display:none">No games match your filters.</div>
</div>

s", "steam_desc": "Very Positive", "steam_pct": 90, "steam_n": 3602, "steam_appid": 225160, "metacritic_url": null}, {"title": "Caveblazers", "category": "CrossOver", "stores": ["Humble"], "mc": null, "detail": "playable", "steam_desc": "Very Positive", "steam_pct": 85, "steam_n": 4492, "steam_appid": 452060, "metacritic_url": null}, {"title": "Jet Set Radio", "category": "CrossOver", "stores": ["Steam"], "mc": null, "detail": "perfect", "steam_desc": "", "steam_pct": null, "steam_n": null, "steam_appid": null, "metacritic_url": null}]};
const CAT_ORDER = ["ARM Native", "Rosetta 2", "Steam macOS", "CrossOver"];
const CAT_CLASS = {"ARM Native":"cat-arm","Rosetta 2":"cat-rosetta","Steam macOS":"cat-steam","CrossOver":"cat-crossover"};
const CAT_PRIO = {"ARM Native":0,"Rosetta 2":1,"Steam macOS":2,"CrossOver":3};
const STORES = ["Steam", "GOG", "Humble", "Epic"];
const STEAM_ORDER = ["Overwhelmingly Positive", "Very Positive", "Positive",
  "Mostly Positive", "Mixed", "Mostly Negative", "Negative",
  "Very Negative", "Overwhelmingly Negative"];

const state = {
  q: "",
  cat: "",
  store: "",
  steam: "",
  minmc: 0,
  sortKey: "default",
  sortDir: -1,
};

function mcClass(v) {
  if (v == null) return "mc-na";
  if (v >= 90) return "mc-90";
  if (v >= 80) return "mc-80";
  if (v >= 70) return "mc-70";
  if (v >= 60) return "mc-60";
  return "mc-low";
}
function pctColor(v) {
  if (v == null) return "var(--muted)";
  if (v >= 90) return "var(--green)";
  if (v >= 75) return "var(--lime)";
  if (v >= 60) return "var(--yellow)";
  if (v >= 40) return "var(--orange)";
  return "var(--red)";
}

// Steam app IDs are real deep links; other stores only have search URLs.
function storeUrl(store, r) {
  const q = encodeURIComponent(r.title);
  if (store === "Steam") {
    return r.steam_appid
      ? `https://store.steampowered.com/app/${r.steam_appid}/`
      : `https://store.steampowered.com/search/?term=${q}`;
  }
  if (store === "GOG")    return `https://www.gog.com/en/games?query=${q}`;
  if (store === "Epic")   return `https://store.epicgames.com/en-US/browse?q=${q}`;
  if (store === "Humble") return `https://www.humblebundle.com/store/search?search=${q}`;
  return null;
}

function titleUrl(r) {
  if (r.steam_appid) return `https://store.steampowered.com/app/${r.steam_appid}/`;
  if (r.metacritic_url) return r.metacritic_url;
  return storeUrl(r.stores[0], r);
}

function renderStats() {
  document.getElementById("subtitle").textContent =
    `${DATA.total} owned games run on Apple Silicon` +
    (DATA.owned ? ` (out of ${DATA.owned.toLocaleString()} owned)` : "");
  const counts = {};
  CAT_ORDER.forEach(c => counts[c] = 0);
  DATA.rows.forEach(r => counts[r.category] = (counts[r.category] || 0) + 1);
  const el = document.getElementById("stats");
  el.innerHTML = "";
  const make = (num, lbl) => `<div class="stat"><div class="num">${num}</div><div class="lbl">${lbl}</div></div>`;
  el.insertAdjacentHTML("beforeend", make(DATA.rows.length, "Total runnable"));
  CAT_ORDER.forEach(c => { if (counts[c]) el.insertAdjacentHTML("beforeend", make(counts[c], c)); });
}

function fillSelect(id, values) {
  const sel = document.getElementById(id);
  values.forEach(v => {
    const o = document.createElement("option");
    o.value = v; o.textContent = v;
    sel.appendChild(o);
  });
}

function filtered() {
  const q = state.q.toLowerCase();
  return DATA.rows.filter(r => {
    if (q && !r.title.toLowerCase().includes(q)) return false;
    if (state.cat && r.category !== state.cat) return false;
    if (state.store && !r.stores.includes(state.store)) return false;
    if (state.steam && r.steam_desc !== state.steam) return false;
    if (state.minmc && (r.mc == null || r.mc < state.minmc)) return false;
    return true;
  });
}

function sorted(rows) {
  const k = state.sortKey, dir = state.sortDir;
  const val = r => {
    if (k === "title") return r.title.toLowerCase();
    if (k === "category") return CAT_PRIO[r.category];
    if (k === "stores") return r.stores.length;
    if (k === "mc") return r.mc == null ? -1 : r.mc;
    if (k === "steam_pct") return r.steam_pct == null ? -1 : r.steam_pct;
    if (k === "steam_n") return r.steam_n == null ? -1 : r.steam_n;
    return 0;
  };
  if (k === "default") {
    return rows.slice().sort((a, b) =>
      (CAT_PRIO[a.category] - CAT_PRIO[b.category]) ||
      ((b.mc ?? -1) - (a.mc ?? -1)) ||
      ((b.steam_pct ?? -1) - (a.steam_pct ?? -1)) ||
      ((b.steam_n ?? 0) - (a.steam_n ?? 0)) ||
      a.title.toLowerCase().localeCompare(b.title.toLowerCase()));
  }
  return rows.slice().sort((a, b) => {
    const va = val(a), vb = val(b);
    if (va < vb) return -1 * dir;
    if (va > vb) return 1 * dir;
    return a.title.toLowerCase().localeCompare(b.title.toLowerCase());
  });
}

function render() {
  const rows = sorted(filtered());
  const tbody = document.getElementById("rows");
  tbody.innerHTML = "";
  document.getElementById("empty").style.display = rows.length ? "none" : "block";
  document.getElementById("count").textContent =
    `Showing ${rows.length} of ${DATA.rows.length} games`;

  const frag = document.createDocumentFragment();
  rows.forEach(r => {
    const tr = document.createElement("tr");
    const stores = r.stores.map(s => {
      const u = storeUrl(s, r);
      return u ? `<a class="store" href="${u}" target="_blank" rel="noopener">${s}</a>`
               : `<span class="store">${s}</span>`;
    }).join("");
    const mcInner = r.mc == null ? `<span class="mc mc-na">–</span>`
      : `<span class="mc ${mcClass(r.mc)}">${r.mc}</span>`;
    const mc = (r.mc != null && r.metacritic_url)
      ? `<a class="mc-link" href="${r.metacritic_url}" target="_blank" rel="noopener" title="Metacritic">${mcInner}</a>`
      : mcInner;
    const tUrl = titleUrl(r);
    const titleCell = tUrl
      ? `<a class="title-link" href="${tUrl}" target="_blank" rel="noopener">${escapeHtml(r.title)}</a>`
      : escapeHtml(r.title);
    let reviews = `<span class="muted">–</span>`;
    if (r.steam_pct != null) {
      const w = r.steam_pct;
      reviews = `<div class="pctbar" title="${escapeHtml(r.steam_desc || "")}">
          <div class="track"><div class="fill" style="width:${w}%;background:${pctColor(r.steam_pct)}"></div></div>
          <span class="pct">${r.steam_pct}%</span>
        </div>`;
    }
    const n = r.steam_n == null ? `<span class="muted">–</span>` : r.steam_n.toLocaleString();
    tr.innerHTML =
      `<td class="title">${titleCell}</td>
       <td class="hide-sm"><span class="badge ${CAT_CLASS[r.category]}">${r.category}</span></td>
       <td class="hide-sm">${stores}</td>
       <td class="num">${mc}</td>
       <td>${reviews}</td>
       <td class="num hide-sm">${n}</td>`;
    frag.appendChild(tr);
  });
  tbody.appendChild(frag);
  updateHeaders();
}

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
}

function updateHeaders() {
  document.querySelectorAll("thead th").forEach(th => {
    const base = th.dataset.label || (th.dataset.label = th.textContent);
    const k = th.dataset.key;
    if (k === state.sortKey) {
      th.innerHTML = base + ` <span class="arrow">${state.sortDir === 1 ? "▲" : "▼"}</span>`;
    } else {
      th.textContent = base;
    }
  });
}

function init() {
  renderStats();
  fillSelect("cat", CAT_ORDER.filter(c => DATA.rows.some(r => r.category === c)));
  fillSelect("store", STORES.filter(s => DATA.rows.some(r => r.stores.includes(s))));
  const steamPresent = new Set(DATA.rows.map(r => r.steam_desc).filter(Boolean));
  const steamVals = STEAM_ORDER.filter(d => steamPresent.has(d))
    .concat([...steamPresent].filter(d => !STEAM_ORDER.includes(d)).sort());
  fillSelect("steam", steamVals);

  let t;
  document.getElementById("q").addEventListener("input", e => {
    clearTimeout(t);
    t = setTimeout(() => { state.q = e.target.value; render(); }, 120);
  });
  document.getElementById("cat").addEventListener("change", e => { state.cat = e.target.value; render(); });
  document.getElementById("store").addEventListener("change", e => { state.store = e.target.value; render(); });
  document.getElementById("steam").addEventListener("change", e => { state.steam = e.target.value; render(); });
  document.getElementById("minmc").addEventListener("change", e => {
    state.minmc = parseInt(e.target.value, 10); render();
  });
  document.querySelectorAll("thead th").forEach(th => {
    th.addEventListener("click", () => {
      const k = th.dataset.key;
      if (state.sortKey === k) state.sortDir *= -1;
      else { state.sortKey = k; state.sortDir = (k === "title") ? 1 : -1; }
      render();
    });
  });
  render();
}
init();
</script>
