<style>
:root{--bd:#ddd;--mut:#666;--bg:#fff;--hl:#f5f5f7;--accent:#0066cc}
*{box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{font:15px/1.4 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;margin:0;color:#111;background:var(--bg)}
header{padding:16px 20px;border-bottom:1px solid var(--bd);background:var(--bg);position:sticky;top:0;z-index:10}
h1{margin:0 0 4px;font-size:19px}
.sub{color:var(--mut);font-size:12.5px}
.controls{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;align-items:center}
input[type=search],select{font-size:16px;padding:10px 12px;border:1px solid var(--bd);border-radius:10px;background:#fff;min-height:44px}
input[type=search]{flex:1;min-width:160px}
select{flex:1;min-width:120px}
.count{color:var(--mut);font-size:12.5px;white-space:nowrap;width:100%}
.wrap{padding:0 12px 40px}
.scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{border-collapse:collapse;width:100%;margin-top:8px;min-width:600px}
th,td{text-align:left;padding:10px 10px;border-bottom:1px solid var(--bd);vertical-align:top}
thead th{background:var(--bg);cursor:pointer;user-select:none;font-size:13px;color:var(--mut);white-space:nowrap;box-shadow:inset 0 -1px 0 var(--bd)}
th:hover{color:#111}
th .ar{font-size:10px;opacity:.5}
tr:hover td{background:var(--hl)}
td.name{font-weight:500}
td.name a{color:#111}
td.name a:hover{color:var(--accent)}
td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
.badge{display:inline-block;font-size:11px;padding:3px 8px;border-radius:20px;border:1px solid var(--bd);color:var(--mut)}
.paid{border-color:#1a7f37;color:#1a7f37}
.cat{font-size:12px;color:var(--mut)}
.star{color:#e8a000}
.rc{color:var(--mut);font-size:11px}
a{color:var(--accent);text-decoration:none}a:hover{text-decoration:underline}
.empty{padding:40px;text-align:center;color:var(--mut)}
@media(max-width:640px){.sub{font-size:12px}.hideS{display:none}td,th{padding:12px 8px}.wrap{padding:0 8px 40px}}
</style></head>

function fill(id,vals){const s=document.getElementById(id);vals.forEach(v=>{const o=document.createElement('option');o.value=v;o.textContent=v;s.appendChild(o)})}
fill('cat',[...new Set(DATA.map(d=>d.c))].sort());
fill('plat',[...new Set(DATA.map(d=>d.p))].sort());
let sortK='n',sortAsc=true;
const q=document.getElementById('q'),catS=document.getElementById('cat'),platS=document.getElementById('plat'),pay=document.getElementById('pay'),rateS=document.getElementById('rate'),
 body=document.getElementById('body'),count=document.getElementById('count'),empty=document.getElementById('empty');
function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function render(){
 const term=q.value.trim().toLowerCase(),cf=catS.value,pf=platS.value,py=pay.value,rv=rateS.value;
 let r=DATA.filter(d=>(!term||d.n.toLowerCase().includes(term))&&(!cf||d.c===cf)&&(!pf||d.p===pf)&&(py===''||(py==='1')===d.paid)&&(rv===''||(rv==='rated'?d.r>0:d.r>=parseFloat(rv))));

  <td class="hideS">${esc(d.p)}</td>
  <td>${d.d}</td>
  <td class="num">${d.paid?'<span class="badge paid">'+d.price.toFixed(2)+'</span>':'<span class="badge">free</span>'}</td>
  <td class="num">${d.now<0?'<span style="color:#bbb">&mdash;</span>':(d.now===0?'<span class="badge">free</span>':'<span class="badge paid">'+d.now.toFixed(2)+'</span>')}</td>

}
document.querySelectorAll('th[data-k]').forEach(th=>th.addEventListener('click',()=>{const k=th.dataset.k;if(k===sortK)sortAsc=!sortAsc;else{sortK=k;sortAsc=true}render();}));

render();
