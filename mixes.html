<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIXES // soobrosa</title>
    <link rel="stylesheet" href="/assets/css/site.css">
    <style>
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 18px;
            margin-top: 10px;
        }
        .mix-card {
            position: relative;
            background: var(--panel);
            aspect-ratio: 1 / 1;
            overflow: hidden;
            cursor: pointer;
            box-shadow: -4px 0 0 var(--dim),4px 0 0 var(--dim),0 -4px 0 var(--dim),0 4px 0 var(--dim);
            transition: transform .1s;
        }
        .mix-card:hover { transform: translate(-2px,-2px); }
        .mix-card img { width: 100%; height: 100%; object-fit: cover; image-rendering: auto; }
        .mix-card .title-fallback {
            width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
            padding: 18px; text-align: center; font-family: var(--pixel); font-size: 10px; line-height: 1.7;
            color: var(--text); background: var(--panel); box-sizing: border-box;
        }
        .overlay {
            position: absolute; inset: 0; background: rgba(10,10,20,.7);
            display: flex; align-items: center; justify-content: center; gap: 18px;
            opacity: 0; transition: opacity .15s;
        }
        .mix-card:hover .overlay, .mix-card.playing .overlay, .mix-card.loading .overlay { opacity: 1; }
        .icon { font-size: 48px; color: var(--white); user-select: none; cursor: pointer; }
        .icon:hover { color: var(--yellow); }
        .download-icon { font-size: 38px; }
        .spinner { width: 40px; height: 40px; border: 5px solid rgba(255,255,255,.2); border-top-color: var(--cyan); animation: spin .8s steps(8) infinite; display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .mix-card.loading .spinner { display: block; }
        .mix-card.loading .icon { display: none; }
        .mix-card.playing .icon { color: var(--cyan); }
    </style>
</head>
<body>
<main class="wrap" style="max-width:1100px">
    <nav class="topnav">
        <a class="brand" href="/index.html">soobrosa</a>
        <a href="/index.html">BIO</a>
        <a href="/mixes.html" class="active">MIXES</a>
        <a href="/words.html">WORDS</a>
        <a href="/lab.html">LAB</a>
    </nav>

    <h1 class="title">MIXES</h1>
    <p class="hint">Two decades on the decks. Click to play, &#8595; to download.</p>

    <div class="grid" id="mix-grid"></div>

    <footer class="foot">DANIEL MOLNAR &middot; soobrosa@gmail.com &middot; <a href="https://github.com/soobrosa">github</a></footer>
</main>

<script>
    const grid = document.getElementById('mix-grid');
    let currentAudio = new Audio();
    let currentCard = null;
    let mixes = [];

    fetch('/mixes.json')
        .then(response => response.json())
        .then(data => {
            mixes = data.sort((a, b) => b.id - a.id);
            setupGrid();
        })
        .catch(error => {
            console.error('Error loading mixes:', error);
            grid.innerHTML = '<p style="color: var(--magenta);">Failed to load mixes.json</p>';
        });

    function setupGrid() {
        mixes.forEach(mix => {
            const card = document.createElement('div');
            card.className = 'mix-card';
            const hasCover = mix.cover && mix.cover.trim() !== '';
            const cover = hasCover ? `/${mix.cover.replace(/^\//, '')}` : '';

            if (hasCover) {
                card.innerHTML = `
                    <img src="${cover}" alt="${mix.title}">
                    <div class="title-fallback" style="display: none;">${mix.title}</div>
                    <div class="overlay">
                        <div class="spinner"></div>
                        <div class="icon play-icon">&#9654;</div>
                        <div class="icon download-icon" title="Download">&#11015;</div>
                    </div>`;
                const img = card.querySelector('img');
                const titleFallback = card.querySelector('.title-fallback');
                img.onerror = function () { img.style.display = 'none'; titleFallback.style.display = 'flex'; };
            } else {
                card.innerHTML = `
                    <div class="title-fallback">${mix.title}</div>
                    <div class="overlay">
                        <div class="spinner"></div>
                        <div class="icon play-icon">&#9654;</div>
                        <div class="icon download-icon" title="Download">&#11015;</div>
                    </div>`;
            }

            const playIcon = card.querySelector('.play-icon');
            const downloadIcon = card.querySelector('.download-icon');
            playIcon.addEventListener('click', (e) => { e.stopPropagation(); handlePlayPause(mix, card); });
            downloadIcon.addEventListener('click', (e) => { e.stopPropagation(); downloadMix(mix); });
            card.addEventListener('click', () => handlePlayPause(mix, card));
            grid.appendChild(card);
        });
    }

    function handlePlayPause(mix, card) {
        if (currentAudio.src === mix.url) {
            if (currentAudio.paused) currentAudio.play(); else currentAudio.pause();
            updateUI();
            return;
        }
        if (currentCard) currentCard.classList.remove('playing', 'loading');
        currentAudio.src = mix.url;
        currentCard = card;
        currentAudio.play();
        updateUI();
    }

    function updateUI() {
        if (!currentCard) return;
        const icon = currentCard.querySelector('.play-icon');
        if (currentAudio.paused) { icon.innerHTML = '&#9654;'; currentCard.classList.remove('playing'); }
        else { icon.innerHTML = '&#10074;&#10074;'; currentCard.classList.add('playing'); }
    }

    function downloadMix(mix) {
        const link = document.createElement('a');
        link.href = mix.url;
        link.download = `${mix.title}.mp3`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    currentAudio.onwaiting = () => currentCard?.classList.add('loading');
    currentAudio.onplaying = () => currentCard?.classList.remove('loading');
    currentAudio.onpause = () => updateUI();
    currentAudio.onplay = () => updateUI();
</script>
</body>
</html>
